services:
  ollama:
    image: ollama/ollama:latest
    container_name: ai-devops-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped

  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: ai-devops-open-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - ollama
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: ai-devops-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: agentdb
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: agentpassword
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: ai-devops-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    restart: unless-stopped

  agent-api:
    build:
      context: ./app
    container_name: ai-devops-agent-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./docs:/docs:ro
      - ./data:/data:ro
      - ~/.kube:/root/.kube:ro
    depends_on:
      - ollama
      - postgres
      - qdrant
    restart: unless-stopped

volumes:
  ollama-data:
  open-webui-data:
  postgres-data:
  qdrant-data:
